apiVersion: apps/v1
kind: Deployment
metadata:
  name: studio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: studio
  template:
    metadata:
      labels:
        app: studio
    spec:
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox
          command:
            - sh
            - -c
            - until nc -zw1 rabbitmq 5672; do sleep 2; done

      containers:
        - name: voctocore
          image: martin1210235/voctomix:latest
          imagePullPolicy: Always
          command: ["bash", "-c", "cd /opt/voctomix/voctocore && python3 voctocore.py"]
          envFrom:
            - configMapRef:
                name: voctomix-config
            - secretRef:
                name: voctomix-secret
          volumeMounts:
            - name: sessions
              mountPath: /opt/voctomix/sessions
          readinessProbe:
            tcpSocket:
              port: 9999
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 12

        - name: telemetry
          image: martin1210235/voctomix:latest
          imagePullPolicy: Always
          command: ["python3", "example-scripts/ffmpeg/telemetry_service.py"]
          envFrom:
            - configMapRef:
                name: voctomix-config
            - secretRef:
                name: voctomix-secret
          volumeMounts:
            - name: sessions
              mountPath: /opt/voctomix/sessions

        - name: cam1
          image: martin1210235/voctomix:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - >-
              ffmpeg -y -nostdin
              -i "${CAM1_SOURCE}"
              -ac 2
              -filter_complex "[0:v] scale=${WIDTH}:${HEIGHT},fps=${FRAMERATE} [v]; [0:a] aresample=${AUDIORATE} [a]"
              -map "[v]" -map "[a]"
              -pix_fmt yuv420p -c:v rawvideo -c:a pcm_s16le
              -f matroska tcp://localhost:${CAM1_PORT}
          envFrom:
            - configMapRef:
                name: voctomix-config

        - name: cam2
          image: martin1210235/voctomix:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - >-
              ffmpeg -y -nostdin
              -i "${CAM2_SOURCE}"
              -ac 2
              -filter_complex "[0:v] scale=${WIDTH}:${HEIGHT},fps=${FRAMERATE} [v]; [0:a] aresample=${AUDIORATE} [a]"
              -map "[v]" -map "[a]"
              -pix_fmt yuv420p -c:v rawvideo -c:a pcm_s16le
              -f matroska tcp://localhost:${CAM2_PORT}
          envFrom:
            - configMapRef:
                name: voctomix-config

        - name: cam3
          image: martin1210235/voctomix:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - >-
              ffmpeg -y -nostdin
              -i "${CAM3_SOURCE}"
              -ac 2
              -filter_complex "[0:v] scale=${WIDTH}:${HEIGHT},fps=${FRAMERATE} [v]; [0:a] aresample=${AUDIORATE} [a]"
              -map "[v]" -map "[a]"
              -pix_fmt yuv420p -c:v rawvideo -c:a pcm_s16le
              -f matroska tcp://localhost:${CAM3_PORT}
          envFrom:
            - configMapRef:
                name: voctomix-config

        - name: cam4
          image: martin1210235/voctomix:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - >-
              ffmpeg -y -nostdin -stream_loop -1
              -i "${CAM4_SOURCE}"
              -filter_complex "[0:v] format=yuv420p,scale=${WIDTH}:${HEIGHT}:out_range=tv,fps=${FRAMERATE},setparams=color_primaries=bt709:color_trc=bt709:colorspace=bt709 [v]; [0:a] aresample=${AUDIORATE} [a]"
              -map "[v]" -map "[a]"
              -color_primaries bt709 -color_trc bt709 -colorspace bt709 -color_range tv
              -c:v rawvideo -c:a pcm_s16le
              -f matroska tcp://localhost:${CAM4_PORT}
          envFrom:
            - configMapRef:
                name: voctomix-config

        - name: break
          image: martin1210235/voctomix:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - >-
              ffmpeg -y -nostdin -stream_loop -1
              -i "${BREAK_VIDEO}"
              -re -stream_loop -1 -i "${BREAK_AUDIO}"
              -filter_complex "[0:v] format=yuv420p,scale=${WIDTH}:${HEIGHT}:out_range=tv,fps=${FRAMERATE},setparams=color_primaries=bt709:color_trc=bt709:colorspace=bt709 [v]; [1:a] aresample=${AUDIORATE},pan=stereo|c0=c0|c1=c1 [a]"
              -map "[v]" -map "[a]"
              -c:v rawvideo -c:a pcm_s16le
              -f matroska tcp://localhost:${BREAK_PORT}
          envFrom:
            - configMapRef:
                name: voctomix-config

        - name: intro
          image: martin1210235/voctomix:latest
          imagePullPolicy: Always
          command:
            - bash
            - -c
            - |
              while true; do
                ffmpeg -loglevel quiet -nostats -re \
                  -i "${INTRO_VIDEO}" \
                  -f lavfi -i anullsrc=r=${AUDIORATE}:cl=stereo \
                  -pix_fmt yuv420p -s "${WIDTH}x${HEIGHT}" -r "${FRAMERATE}" \
                  -c:v rawvideo -c:a pcm_s16le \
                  -map 0:v:0 -map 1:a:0 \
                  -shortest \
                  -f matroska tcp://127.0.0.1:${INTRO_PORT} 2>/dev/null
                sleep 1
              done
          envFrom:
            - configMapRef:
                name: voctomix-config

        - name: stream-blanker
          image: martin1210235/voctomix:latest
          imagePullPolicy: Always
          command:
            - bash
            - -c
            - |
              ffmpeg -nostats -loglevel warning -stream_loop -1 -re \
                -i "${PAUSE_VIDEO}" \
                -pix_fmt yuv420p -s "${WIDTH}x${HEIGHT}" -r "${FRAMERATE}" \
                -c:v rawvideo -an -f matroska tcp://127.0.0.1:${BLANKER_PAUSE_PORT} &
              ffmpeg -nostats -loglevel warning -stream_loop -1 -re \
                -i "${OFFLINE_VIDEO}" \
                -pix_fmt yuv420p -s "${WIDTH}x${HEIGHT}" -r "${FRAMERATE}" \
                -c:v rawvideo -an -f matroska tcp://127.0.0.1:${BLANKER_OFFLINE_PORT} &
              wait
          envFrom:
            - configMapRef:
                name: voctomix-config

        - name: audio-manager
          image: martin1210235/voctomix:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - >-
              ffmpeg -nostats -loglevel warning -re -stream_loop -1
              -i "${BACKGROUND_MUSIC}"
              -c:a pcm_s16le -ar ${AUDIORATE} -ac 2 -vn
              -f matroska tcp://127.0.0.1:${AUDIO_PORT}
          envFrom:
            - configMapRef:
                name: voctomix-config

      volumes:
        - name: sessions
          persistentVolumeClaim:
            claimName: voctomix-sessions-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: studio
spec:
  type: NodePort
  selector:
    app: studio
  ports:
    - name: control
      port: 9999
      targetPort: 9999
      nodePort: 30999
    - name: clock-udp
      protocol: UDP
      port: 9998
      targetPort: 9998
      nodePort: 30998
    - name: telemetry
      port: 8080
      targetPort: 8080
      nodePort: 30808
    - name: program-out
      port: 15000
      targetPort: 15000
      nodePort: 31500
    - name: mix-out
      port: 11000
      targetPort: 11000
      nodePort: 31100
    - name: mix-preview
      port: 12000
      targetPort: 12000
      nodePort: 31200
    - name: preview-0
      port: 14000
      targetPort: 14000
      nodePort: 31400
    - name: preview-1
      port: 14001
      targetPort: 14001
      nodePort: 31401
    - name: preview-2
      port: 14002
      targetPort: 14002
      nodePort: 31402
    - name: preview-3
      port: 14003
      targetPort: 14003
      nodePort: 31403
    - name: preview-4
      port: 14004
      targetPort: 14004
      nodePort: 31404
    - name: preview-5
      port: 14005
      targetPort: 14005
      nodePort: 31405
