# Experiment override for docker-compose.yml.
# Replaces internet-sourced camera streams with local FFmpeg test pattern generators
# (testsrc2) that are infinite, require no network, and never exit cleanly —
# eliminating the restart-on-video-end bug seen with cam1/cam2/cam3.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.experiments.yml up -d

services:
  cam1:
    command:
      - bash
      - -c
      - |
        while true; do
          ffmpeg -y -nostdin -re \
            -f lavfi -i "testsrc2=size=${WIDTH:-1920}x${HEIGHT:-1080}:rate=${FRAMERATE:-25}" \
            -f lavfi -i "anullsrc=r=${AUDIORATE:-48000}:cl=stereo" \
            -ac 2 \
            -pix_fmt yuv420p -c:v rawvideo -c:a pcm_s16le \
            -f matroska tcp://localhost:${CAM1_PORT:-10000} 2>/dev/null
          sleep 2
        done

  cam2:
