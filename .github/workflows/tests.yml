name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'voctocore/**'
  pull_request:
    paths:
      - 'voctocore/**'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run voctocore unit tests
        run: |
          cd voctocore
          source tests/helper/fake-gi.sh
          python3 -m unittest discover -s tests -p 'test_*.py' -v
