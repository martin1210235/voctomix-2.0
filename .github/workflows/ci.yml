name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (pycodestyle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install pycodestyle
        run: pip install pycodestyle
      - name: Run lint
        run: sh check_pep8.sh
