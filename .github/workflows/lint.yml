name: Lint

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
  pull_request:
    paths:
      - '**/*.py'

jobs:
  pep8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pycodestyle
        run: pip install pycodestyle

      - name: Run PEP8 check
        run: ./check_pep8.sh
