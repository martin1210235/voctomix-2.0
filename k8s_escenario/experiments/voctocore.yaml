apiVersion: apps/v1
kind: Deployment
metadata:
  name: voctocore
  namespace: voctomix-exp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voctocore
  template:
    metadata:
      labels:
        app: voctocore
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: voctocore
          image: voctomix-voctocore:latest
          imagePullPolicy: Never
          command: ["python3", "voctocore/voctocore.py"]
          workingDir: /opt/voctomix
          readinessProbe:
            exec:
              command: ["bash", "-c", "echo '' | nc -zw1 localhost 9999"]
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: "1"
              memory: "512Mi"
            limits:
              cpu: "4"
              memory: "2Gi"
