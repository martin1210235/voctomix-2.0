apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry
  namespace: voctomix-exp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry
  template:
    metadata:
      labels:
        app: telemetry
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: telemetry
          image: voctomix-voctocore:latest
          imagePullPolicy: Never
          command: ["python3", "example-scripts/ffmpeg/telemetry_service.py"]
          workingDir: /opt/voctomix
          env:
            - name: TELEMETRY_USE_UDP
              value: "1"
            - name: VOCTOCORE_HOST
              value: "localhost"
            - name: RABBITMQ_HOST
              value: "localhost"
            - name: RABBITMQ_USER
              value: "voctomix"
            - name: RABBITMQ_PASS
              value: "voctomix123"
            - name: SAVE_LOGS
              value: "true"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
