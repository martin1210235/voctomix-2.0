[server]
address=localhost
port=9999

[panel]
port=/dev/ttyUSB1
speed=115200
size=4x4

[buttons]
0=set_composite_mode fs
1=set_composite_mode pip
2=set_composite_mode sbs
3=set_composite_mode lec
4=set_video_a cam1
5=set_video_b cam1
6=set_videos_and_composite cam1 * fs
7=not yet implemented
8=set_video_a cam2
9=set_video_b cam2
10=set_videos_and_composite cam2 * fs
11=not yet implemented
12=set_video_a cam3
13=set_video_b cam3
14=set_videos_and_composite cam3 * fs
15=not yet implemented
